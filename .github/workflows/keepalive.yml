name: Keep Railway warm

# 서버 콜드스타트 방지 — /health를 주기적으로 호출해 Railway가 잠들지 않게 유지
on:
  schedule:
    - cron: "*/10 * * * *"   # 10분마다 (GitHub Actions 최소·권장 간격)
  workflow_dispatch:          # 수동 실행 버튼

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          for i in 1 2 3; do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 \
              https://japan-intonation-production.up.railway.app/health || echo "000")
            echo "attempt $i -> HTTP $code"
            if [ "$code" = "200" ]; then exit 0; fi
            sleep 5
          done
          echo "health check did not return 200 (서버 깨우는 중일 수 있음)"
