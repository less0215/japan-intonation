<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />
  <meta name="robots" content="noindex" />
  <title>TickJapan Shadow Player</title>
  <style>
    html, body { margin: 0; height: 100%; background: #000; overflow: hidden; }
    #p, iframe { position: fixed; inset: 0; width: 100%; height: 100%; border: 0; }
  </style>
</head>
<body>
  <!-- 앱(Capacitor) WebView의 유튜브 오류 153 회피용 '제어형' 프록시 페이지.
       라이브캠 live-embed.html(패시브)의 enablejsapi 버전 — 앱은 youtube를 직접 부르지 않고
       이 https://tickjapan.com 페이지를 iframe으로 불러 유튜브 입장에서 출처가 정상 웹사이트가 되게 한다(→153 회피).
       enablejsapi=1 + postMessage 브리지로 재생/일시정지/탐색/현재시간을 앱과 주고받아 자막 싱크를 유지한다. -->
  <div id="p"></div>
  <script>
  (function () {
    var v = new URLSearchParams(location.search).get('v') || '';
    if (!/^[A-Za-z0-9_-]{6,20}$/.test(v)) return;   // 유튜브 ID 형식만 허용
    var player = null, ready = false;
    function post(m) { try { parent.postMessage(Object.assign({ src: 'tj-player' }, m), '*'); } catch (e) {} }
    // YouTube IFrame API 로드
    var tag = document.createElement('script');
    tag.src = 'https://www.youtube.com/iframe_api';
    document.head.appendChild(tag);
    window.onYouTubeIframeAPIReady = function () {
      player = new YT.Player('p', {
        videoId: v,
        host: 'https://www.youtube-nocookie.com',
        playerVars: { enablejsapi: 1, playsinline: 1, rel: 0, modestbranding: 1, cc_load_policy: 0, origin: location.origin },
        events: {
          onReady: function () { ready = true; post({ event: 'ready' }); },
          onStateChange: function (e) { post({ event: 'state', state: e.data }); },
          onError: function (e) { post({ event: 'error', code: e.data }); }
        }
      });
    };
    // 앱 → 플레이어 명령
    window.addEventListener('message', function (e) {
      var d = e.data; if (!d || d.src !== 'tj-app' || !player) return;
      try {
        if (d.cmd === 'play') player.playVideo();
        else if (d.cmd === 'pause') player.pauseVideo();
        else if (d.cmd === 'seek') player.seekTo(d.value, true);
        else if (d.cmd === 'rate' && player.setPlaybackRate) player.setPlaybackRate(d.value);
      } catch (err) {}
    });
    // 플레이어 → 앱 현재시간/상태 (200ms 주기)
    setInterval(function () {
      if (ready && player && player.getCurrentTime) {
        try { post({ event: 'time', t: player.getCurrentTime(), state: player.getPlayerState() }); } catch (e) {}
      }
    }, 200);
  })();
  </script>
</body>
</html>
